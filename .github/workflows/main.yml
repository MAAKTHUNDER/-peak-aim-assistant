name: Build Windows EXE (Vosk)

on:
  push:
    branches: [ vosk-version ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Upgrade pip
      run: python -m pip install --upgrade pip
    
    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build EXE
      shell: pwsh
      run: |
        pyinstaller --onefile --windowed `
          --hidden-import=pyaudio `
          --hidden-import=vosk `
          --icon=icon.ico `
          --add-data "logo.png;." `
          --add-data "youtube.png;." `
          --add-data "tiktok.png;." `
          --add-data "icon.ico;." `
          --name=PeakAimAssistant-Vosk `
          peak_aim_assistant_vosk.py
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: PeakAimAssistant-Vosk-Windows
        path: dist/PeakAimAssistant-Vosk.exe
        retention-days: 90
