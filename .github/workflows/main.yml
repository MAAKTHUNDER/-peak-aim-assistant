name: Build Windows EXE (Vosk)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Upgrade pip
      run: python -m pip install --upgrade pip
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller
    
    # -----------------------------
    # Download Vosk Model
    # -----------------------------
    - name: Download Vosk Model
      shell: pwsh
      run: |
        curl -L -o vosk-model.zip https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip
        Expand-Archive -Path vosk-model.zip -DestinationPath .
        Remove-Item vosk-model.zip
    
    # -----------------------------
    # BUILD EXE (FIXED)
    # -----------------------------
    - name: Build EXE
      shell: pwsh
      run: |
        pyinstaller --onefile --windowed `
          --collect-all vosk `
          --hidden-import=pyaudio `
          --icon=icon.ico `
          --add-data "logo.png;." `
          --add-data "youtube.png;." `
          --add-data "tiktok.png;." `
          --add-data "icon.ico;." `
          --add-data "vosk-model-small-en-us-0.15;vosk-model-small-en-us-0.15" `
          --name=PeakAimAssistant-Vosk `
          peak_aim_assistant.py
    
    # -----------------------------
    # Upload artifact
    # -----------------------------
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: PeakAimAssistant-Vosk-Windows
        path: dist/PeakAimAssistant-Vosk.exe
        retention-days: 90
