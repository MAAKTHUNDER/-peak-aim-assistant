name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Install PyAudio
      run: |
        pip install https://files.pythonhosted.org/packages/b0/cd/7c7f3585244867d02c61a0e7b83b96dde8ac5b4b628e3abb62a85eb2af6f/PyAudio-0.2.14-cp311-cp311-win_amd64.whl
    
    - name: Build EXE with all resources
      run: |
        pyinstaller --onefile --windowed --icon=icon.ico --add-data "logo.png;." --add-data "youtube.png;." --add-data "tiktok.png;." --add-data "icon.ico;." --name=PeakAimAssistant peak_aim_assistant.py
    
    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: PeakAimAssistant-Windows
        path: dist/PeakAimAssistant.exe
        retention-days: 90
